<ng-content>
  <div class="chat-flow-container" autoScroll>
    @for (msg of engine.messages; track $index) {
      <div class="chat-message" [ngClass]="msg.from">
        @if (msg.from === "question") {
          <ion-icon name="agent-icon"></ion-icon>
        }
        <p [ngClass]="msg.from">
          {{ msg.message  | message: chatMessage() : msg.from === 'answer' }}
        </p>
      </div>
    }
  </div>
</ng-content>
