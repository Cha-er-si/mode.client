@if (engine.presentInput) {
  @if (currentQuestion?.type === "input") {
    <app-chat-input
      [placeholder]="processedPlaceholder"
      (submit)="onAnswer($event)"
    >
    </app-chat-input>
  }
  @if (currentQuestion?.type === "selection") {
    <app-chat-selection
      [chatMessage]="chatMessage()"
      (submit)="onAnswer($event)"
    >
    </app-chat-selection>
  }
}
